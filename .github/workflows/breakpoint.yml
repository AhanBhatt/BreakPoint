name: BreakPoint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  breakpoint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Run Python tests
        run: python -m pytest -q
      - name: Compile actual trace-derived eval artifacts
        run: python -m breakpoint_eval.cli actual-data --out-dir artifacts/actual --variants-per-item 1
      - name: Select regression packs
        run: python -m breakpoint_eval.cli ci-packs --product artifacts/actual/product.json --changed-files "app/rag/retriever.py,agents/tools/order_tool.py,app/prompts/system_policy.py" --risk medium --out artifacts/ci/packs.json
