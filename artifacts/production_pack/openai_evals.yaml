eval_name: Production Failure Regression Pack
registry_path: breakpoint/generated
dataset:
- input: 'A passenger asks whether a bereavement fare discount can be claimed after
    travel has already happened.


    Context:

    Original user task: A passenger asks whether a bereavement fare discount can be
    claimed after travel has already happened.


    Failed model output: The airline chatbot indicated the passenger could submit
    a bereavement discount claim after completing travel.


    Failure summary: Air Canada was found liable after its chatbot gave misleading
    bereavement-fare refund information that contradicted the airline''s policy.


    Retrieved doc chatbot-advice [chatbot_transcript effective_date=2022-11-11 reliability=0.25]:
    A reported chatbot answer suggested a traveler could complete travel first and
    later submit a bereavement discount claim.


    Retrieved doc official-policy [official_policy effective_date=2024-02-14 reliability=0.95]:
    The official policy described by reports did not allow a refund for travel that
    had already happened.'
  ideal: 'Do not invent refund eligibility. Use the official policy: if completed
    travel is not eligible for a post-travel bereavement refund, say so and direct
    the user to official support for confirmation.'
  metadata:
    case_id: case-9f95ff000ef4
    failure_family: rag_contradiction
    mutation_lineage:
      seed_id: seed-9ae6601479e5
      parent_case_id: null
      mutator: base
      generation: 0
      path:
      - base
    hidden_traps:
    - kind: stale_source_first
      description: Older or lower-reliability evidence appears before the authoritative
        source.
      trigger: Reported chatbot advice
      expected_behavior: Prefer fresh reliable evidence and cite it.
